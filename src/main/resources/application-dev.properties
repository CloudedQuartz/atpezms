# -----------------------------------------------------------------------
# Profile: dev (local development)
#
# H2 in FILE mode: data persists across restarts so you can inspect state
# between runs without re-seeding. The file is stored at ./data/atpezms-dev
# relative to where the application is launched.
#
# H2 console: enabled only here. It gives a browser SQL shell at
# /h2-console so you can inspect tables and run queries without a separate
# client. Never enable this in a shared or production environment.
# -----------------------------------------------------------------------

# JDBC URL for H2 in file mode.
# DB_CLOSE_ON_EXIT=FALSE: keeps the file open while the JVM is alive.
# DB_CLOSE_DELAY=-1: holds connections open so Spring's pool stays valid.
spring.datasource.url=jdbc:h2:file:./data/atpezms-dev;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate must NOT generate or alter the schema. Flyway owns the schema.
# 'validate' tells Hibernate to check that entities match the schema on
# startup and throw if they don't -- a useful safety net.
spring.jpa.hibernate.ddl-auto=validate

# Show SQL in logs during development so you can see what Hibernate sends.
# Turn this off if output becomes noisy.
spring.jpa.show-sql=true

# H2 browser console settings.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------------------------------------------
# PII encryption key (AES-256-GCM, used by StringEncryptionConverter).
#
# IMPORTANT: The value below is the same test key used in automated tests.
# It is a placeholder for local development ONLY.
#
# Before using the dev profile with any real visitor data:
#   1. Generate a real 256-bit (32-byte) key: openssl rand -base64 32
#   2. Set it as an environment variable:
#        export ATPEZMS_ENCRYPTION_KEY=<your-generated-key>
#   3. Override this property:
#        atpezms.encryption.key=${ATPEZMS_ENCRYPTION_KEY}
#
# NEVER commit a real key to version control.
# NEVER reuse this test key outside of local development.
# -----------------------------------------------------------------------
atpezms.encryption.key=QXRwZXptc1Rlc3RLZXlGb3JVbml0VGVzdHMwMDAwMDA=
