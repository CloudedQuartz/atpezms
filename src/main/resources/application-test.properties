# -----------------------------------------------------------------------
# Profile: test (automated tests)
#
# H2 in MEMORY mode: the database exists only for the duration of the JVM
# process. Each test run starts completely clean -- no migration leftovers,
# no data from a previous run. This is exactly what we want for repeatable,
# isolated tests.
#
# Tests activate this profile via @ActiveProfiles("test") on the test class.
# They must NEVER run against the dev file database.
# -----------------------------------------------------------------------

# JDBC URL for H2 in-memory mode.
# DB_CLOSE_DELAY=-1: keeps the in-memory database alive for the full
# duration of the Spring context. Without this H2 drops the database as
# soon as the first connection closes, which breaks any pooled setup.
spring.datasource.url=jdbc:h2:mem:atpezms-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Same schema management policy as dev: Flyway owns the schema.
spring.jpa.hibernate.ddl-auto=validate

# No SQL logging in tests -- it clutters test output without adding value.
spring.jpa.show-sql=false

# H2 console is never needed in tests.
spring.h2.console.enabled=false
